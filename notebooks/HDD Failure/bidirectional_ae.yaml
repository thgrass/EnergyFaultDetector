train:
  data_preprocessor:
  autoencoder:
    name: BidirectionalLSTMSeq2OneAutoencoder
    params:
      sequence_builder:
        sequence_length: 7
        ts_freq: "1D"
        stride: 1
        pad_incomplete: true
      batch_size: 4
      early_stopping: false
      epochs: 40
      layers:
      - 16
      - 8
      learning_rate: 0.001
      loss_name: mean_squared_error
      metrics: mean_absolute_error
      stateful: false
      merge_mode: sum

  anomaly_score:
    name: rmse
    params:
      standardize: true

  data_splitter:
    type: train_test_split
    validation_split: 0.2
    shuffle: false

  threshold_selector:
    fit_on_val: true
    name: quantile
    params:
      quantile: 0.97

root_cause_analysis:
  alpha: 0.5
  init_x_bias: recon
  num_iter: 250
  verbose: true